<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>极简录屏 · 录制台</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px 20px 48px;
      font: 14px/1.6 -apple-system, "PingFang SC", system-ui, sans-serif;
      background: #0f1115;
      color: #e7e9ee;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .wrap { width: 100%; max-width: 860px; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: #8b909c; margin: 0 0 24px; font-size: 13px; }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .opt {
      background: #181b22;
      border: 1px solid #262b35;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .opt label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .opt .desc { color: #6f7682; font-size: 11px; margin-top: 4px; }
    select, input[type="checkbox"] { accent-color: #e5384a; }
    select {
      width: 100%;
      margin-top: 6px;
      background: #11141a;
      color: #e7e9ee;
      border: 1px solid #2c323d;
      border-radius: 6px;
      padding: 5px 6px;
    }

    .bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    button {
      border: 0; border-radius: 8px; padding: 11px 20px;
      font-size: 14px; font-weight: 600; cursor: pointer; color: #fff;
    }
    button:disabled { opacity: .4; cursor: not-allowed; }
    #start { background: #e5384a; }
    #start:not(:disabled):hover { background: #cf2c3d; }
    #pause { background: #3a4150; }
    #stop  { background: #2c323d; }
    .timer {
      font-variant-numeric: tabular-nums; font-size: 22px; font-weight: 700;
      letter-spacing: 1px; min-width: 96px;
    }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #e5384a; margin-right: 6px; }
    .rec .dot { animation: blink 1s steps(2, start) infinite; }
    @keyframes blink { to { visibility: hidden; } }
    .status { color: #8b909c; font-size: 13px; }

    video {
      width: 100%; background: #000; border-radius: 12px; border: 1px solid #262b35;
      display: none;
    }
    .download {
      display: none; margin-top: 16px; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .download a {
      background: #1f9d57; color: #fff; text-decoration: none;
      padding: 10px 18px; border-radius: 8px; font-weight: 600;
    }
    .download .size { color: #8b909c; font-size: 12px; }
    .err { color: #ff6b6b; font-size: 13px; margin-top: 10px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎬 极简录屏 · 录制台</h1>
    <p class="sub">点「开始录制」后在弹出的系统选择器里挑选 <b>整个屏幕 / 应用窗口 / 浏览器标签页</b>。</p>

    <div class="options">
      <div class="opt">
        <label><input type="checkbox" id="optMic" /> 录麦克风</label>
        <div class="desc">叠加你的人声讲解（首次需授权麦克风）。</div>
      </div>
      <div class="opt">
        <label><input type="checkbox" id="optSysAudio" checked /> 录系统/标签页声音</label>
        <div class="desc">在选择器里记得勾「分享音频」。</div>
      </div>
      <div class="opt">
        <label for="optFps">帧率</label>
        <select id="optFps">
          <option value="30">30 fps（流畅，默认）</option>
          <option value="60">60 fps（更顺，文件大）</option>
          <option value="15">15 fps（省空间）</option>
        </select>
      </div>
      <div class="opt">
        <label for="optQuality">画质码率</label>
        <select id="optQuality">
          <option value="2500000">标清 ~2.5 Mbps</option>
          <option value="5000000" selected>高清 ~5 Mbps</option>
          <option value="8000000">超清 ~8 Mbps</option>
        </select>
      </div>
    </div>

    <div class="bar">
      <button id="start">● 开始录制</button>
      <button id="pause" disabled>暂停</button>
      <button id="stop" disabled>停止</button>
      <span class="timer" id="timer">00:00</span>
      <span class="status" id="status"></span>
    </div>

    <video id="preview" muted playsinline></video>

    <div class="download" id="dl">
      <a id="dlLink" download>⬇ 下载录像</a>
      <span class="size" id="dlSize"></span>
      <span class="status">已生成预览，可在上方播放器回放。</span>
    </div>

    <div class="err" id="err"></div>
  </div>

  <script src="recorder.js"></script>
</body>
</html>
