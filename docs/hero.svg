<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1100" viewBox="0 0 1100 1100" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="1100" height="1100" fill="#0f1115"/>
  <g transform="translate(0,250)">

  <!-- title -->
  <circle cx="58" cy="50" r="7" fill="#e5384a"/>
  <text x="74" y="58" fill="#e7e9ee" font-size="24" font-weight="700">Simple Screen Recorder</text>
  <text x="1052" y="56" text-anchor="end" fill="#b9bfca" font-size="13">中 / EN</text>
  <text x="48" y="90" fill="#8b909c" font-size="13">Record screen / window / tab — system &amp; mic audio, camera overlay, region crop, pen annotation, camera-only · export webm / mp4</text>

  <!-- ===== option cards ===== -->
  <!-- row 1 -->
  <g>
    <rect x="48"  y="116" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
    <rect x="64"  y="136" width="18" height="18" rx="4" fill="none" stroke="#3a4150" stroke-width="2"/>
    <text x="90"  y="150" fill="#e7e9ee" font-size="14" font-weight="600">Camera only</text>
    <text x="64"  y="180" fill="#6f7682" font-size="11">Full-frame talking head.</text>

    <rect x="252" y="116" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
    <rect x="268" y="136" width="18" height="18" rx="4" fill="none" stroke="#3a4150" stroke-width="2"/>
    <text x="294" y="150" fill="#e7e9ee" font-size="14" font-weight="600">Microphone</text>
    <text x="268" y="180" fill="#6f7682" font-size="11">Add your voice-over.</text>

    <rect x="456" y="116" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
    <rect x="472" y="136" width="18" height="18" rx="4" fill="#e5384a"/>
    <path d="M476 145 L480 149 L487 140" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="498" y="150" fill="#e7e9ee" font-size="14" font-weight="600">System / tab audio</text>
    <text x="472" y="180" fill="#6f7682" font-size="11">Tick “Share audio”.</text>

    <rect x="660" y="116" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
    <rect x="676" y="136" width="18" height="18" rx="4" fill="none" stroke="#3a4150" stroke-width="2"/>
    <text x="702" y="150" fill="#e7e9ee" font-size="14" font-weight="600">Camera overlay</text>
    <text x="676" y="180" fill="#6f7682" font-size="11">Face in a corner.</text>

    <rect x="864" y="116" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
    <rect x="880" y="136" width="18" height="18" rx="4" fill="#e5384a"/>
    <path d="M884 145 L888 149 L895 140" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="906" y="150" fill="#e7e9ee" font-size="14" font-weight="600">Region capture</text>
    <text x="880" y="180" fill="#6f7682" font-size="11">Record just a box.</text>
  </g>

  <!-- row 2 -->
  <g>
    <rect x="48"  y="228" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
    <rect x="64"  y="248" width="18" height="18" rx="4" fill="#e5384a"/>
    <path d="M68 257 L72 261 L79 252" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90"  y="262" fill="#e7e9ee" font-size="14" font-weight="600">Pen annotation</text>
    <text x="64"  y="292" fill="#6f7682" font-size="11">Draw, burned into video.</text>

    <rect x="252" y="228" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
    <rect x="268" y="248" width="18" height="18" rx="4" fill="#e5384a"/>
    <path d="M272 257 L276 261 L283 252" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="294" y="262" fill="#e7e9ee" font-size="14" font-weight="600">Add mid-recording</text>
    <text x="268" y="292" fill="#6f7682" font-size="11">Camera/pen on the fly.</text>

    <rect x="456" y="228" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
    <text x="472" y="252" fill="#b9bfca" font-size="13">Start countdown</text>
    <rect x="472" y="264" width="156" height="30" rx="6" fill="#11141a" stroke="#2c323d"/>
    <text x="484" y="284" fill="#e7e9ee" font-size="13">3 s</text>
    <path d="M612 276 l5 5 l5 -5" fill="none" stroke="#8b909c" stroke-width="1.5"/>

    <rect x="660" y="228" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
    <text x="676" y="252" fill="#b9bfca" font-size="13">Export format</text>
    <rect x="676" y="264" width="156" height="30" rx="6" fill="#11141a" stroke="#2c323d"/>
    <text x="688" y="284" fill="#e7e9ee" font-size="13">mp4 (recent Chrome)</text>
    <path d="M816 276 l5 5 l5 -5" fill="none" stroke="#8b909c" stroke-width="1.5"/>

    <rect x="864" y="228" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
    <text x="880" y="252" fill="#b9bfca" font-size="13">Frame rate</text>
    <rect x="880" y="264" width="156" height="30" rx="6" fill="#11141a" stroke="#2c323d"/>
    <text x="892" y="284" fill="#e7e9ee" font-size="13">60 fps (smoother)</text>
    <path d="M1020 276 l5 5 l5 -5" fill="none" stroke="#8b909c" stroke-width="1.5"/>
  </g>

  <!-- row 3 -->
  <rect x="48" y="340" width="188" height="96" rx="10" fill="#181b22" stroke="#262b35"/>
  <text x="64" y="364" fill="#b9bfca" font-size="13">Quality / bitrate</text>
  <rect x="64" y="376" width="156" height="30" rx="6" fill="#11141a" stroke="#2c323d"/>
  <text x="76" y="396" fill="#e7e9ee" font-size="13">HD ~5 Mbps</text>
  <path d="M204 388 l5 5 l5 -5" fill="none" stroke="#8b909c" stroke-width="1.5"/>

  <!-- ===== action bar ===== -->
  <rect x="48" y="470" width="132" height="46" rx="9" fill="#e5384a"/>
  <circle cx="76" cy="493" r="6" fill="#fff"/>
  <text x="90" y="499" fill="#fff" font-size="15" font-weight="700">Start</text>

  <rect x="192" y="470" width="96" height="46" rx="9" fill="#3a4150"/>
  <text x="240" y="499" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Pause</text>

  <rect x="300" y="470" width="96" height="46" rx="9" fill="#2c323d"/>
  <text x="348" y="499" text-anchor="middle" fill="#cfd3da" font-size="14" font-weight="600">Stop</text>

  <text x="420" y="501" fill="#e7e9ee" font-size="22" font-weight="700">00:00</text>

  <text x="48" y="560" fill="#5d6470" font-size="12">Shortcuts:  Space start/stop  ·  P pause/resume  ·  Ctrl/⌘+Shift+S stop from any tab</text>
  </g>
</svg>
